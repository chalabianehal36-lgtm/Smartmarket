<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Lucky Wheel - Smart Market</title>
<style>
/* عام */
body {
  font-family: Poppins, sans-serif;
  background: #f0f2f5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

h1 {
  color:#e63946;
  text-align:center;
  margin-bottom:30px;
}

/* العجلة */
#wheel-container {
  position: relative;
  width: 320px;
  height: 320px;
}

#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 10px solid #333;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  background: conic-gradient(
    #ff6b6b 0deg 45deg,
    #feca57 45deg 90deg,
    #48dbfb 90deg 135deg,
    #1dd1a1 135deg 180deg,
    #ff9ff3 180deg 225deg,
    #f368e0 225deg 270deg,
    #576574 270deg 315deg,
    #ff9f43 315deg 360deg
  );
  transition: transform 5s cubic-bezier(0.33, 1, 0.68, 1);
}

/* المؤشر */
#pointer{
  width:0; 
  height:0; 
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:40px solid #e63946;
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
}

/* زر الدوران */
#spinBtn{
  margin-top: 30px;
  padding: 15px 35px;
  font-size: 18px;
  background:#00b894;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

#spinBtn:hover{
  background:#019875;
}

/* عرض النتيجة */
#result{
  margin-top:25px;
  font-size:22px;
  font-weight:bold;
  color:#e63946;
  text-align:center;
}

/* نصوص العجلة */
#wheel::before {
  content: '';
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  top:0;
  left:0;
}
</style>
</head>
<body>

<h1>🎡 Lucky Wheel</h1>

<div id="wheel-container">
  <div id="pointer"></div>
  <div id="wheel"></div>
</div>

<button id="spinBtn">Spin 🎉</button>

<div id="result"></div>

<script>
// جائزة كل قسم
const prizes = [
  '5% Discount',
  '10% Discount',
  'Free Shipping',
  '20% Discount',
  'Bonus Points',
  'Try Again',
  '15% Discount',
  'Mystery Gift'
];

const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const result = document.getElementById('result');

let spinning = false;

spinBtn.addEventListener('click', () => {
  if(spinning) return;
  spinning = true;

  // الدوران بشكل عشوائي + 2 دور كامل
  const randomDeg = Math.floor(Math.random() * 360) + 720; 
  wheel.style.transform = rotate(${randomDeg}deg);

  setTimeout(() => {
    const normalizedDeg = randomDeg % 360;
    const index = Math.floor(normalizedDeg / 45); // 8 أقسام
    result.innerHTML = 🎁 You won: <span style="color:#00b894">${prizes[7 - index]}</span>!;
    spinning = false;
  }, 5200);
});
</script>

</body>
</html>

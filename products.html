<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produits - Smart Market</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BODY */
body{
  background:linear-gradient(135deg,#dbeafe,#f0fdf4,#fef9c3);
  transition:0.3s;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 50px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
.navbar h2{
  font-weight:700;
  color:#1e293b;
  font-size:22px;
  letter-spacing:1px;
}

.nav-links{
  display:flex;
  align-items:center;
  gap:15px;
}

/* HOME, PRODUCT, LOGIN LINKS */
.nav-links a{
  text-decoration:none;
  color:#1e293b; 
  font-weight:500;
  position:relative;
  transition:0.3s;
  background:rgba(255,255,255,0.2);
  padding:6px 12px;
  border-radius:12px;
}
.nav-links a:hover{
  background:rgba(255,255,255,0.4);
  transform:scale(1.05);
}

.nav-links a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0%;
  height:2px;
  background:#3b82f6; 
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

/* DARK MODE BUTTON EXACT LIKE INDEX */
#dark-toggle {
  background: rgba(255,255,255,0.2); 
  border: none;
  padding: 6px 15px; 
  border-radius: 15px; 
  cursor: pointer;
  transition: 0.3s;
  color: inherit; 
}

#dark-toggle:hover {
  background: rgba(255,255,255,0.4); 
  transform: scale(1.05);
}

/* CART BUTTON EXACT LIKE INDEX */
.cart {
  background: rgba(255,255,255,0.2); 
  border: none;
  padding: 6px 15px; 
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
  color: inherit;
}

.cart:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.05);
}

/* FILTER */
.filters{
  text-align:center;
  margin-top:20px;
}

.filters select:focus{
  outline:none;
  box-shadow:0 0 0 3px rgba(59,130,246,0.3);
}
.filters select{
  padding:12px 18px;
  border-radius:14px;
  border:none;
  font-weight:500;
  background:white;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}
.filters select:hover{
  transform:scale(1.05);
}

/* PRODUCTS GRID */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  grid-auto-rows: 10px; /* يبقى صغير لنعتمد حساب JS */
  gap:25px;
  padding:50px;
}

/* CARD */

.product-card{
  display:flex;
  flex-direction:column;
  grid-row-end: span 1; /* البداية span 1، سيتم تعديله ديناميكياً */
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  transition:all 0.4s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product-card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 25px 60px rgba(0,0,0,0.2);
}

/* IMAGE */

.product-card img{
  width:100%;
  height:auto; 
  display:block; /* مهم لمنع أي فراغات */
}
.product-card:hover img{
  transform:scale(1.1);
}


/* INFO */
.product-info{
  padding:15px;
}

.product-info h4{
  font-size:15px;
  font-weight:600;
  margin-bottom:5px;
  color:#1e293b;
}

/* PRICE */
.price{
  position:absolute;
  bottom:12px;
  right:12px;
  background:linear-gradient(135deg,#3b82f6,#10b981); 
  color:white;
  padding:8px 14px;
  border-radius:25px; 
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(59,130,246,0.5),0 0 15px rgba(16,185,129,0.5); 
  transition:0.3s;
}

/* BADGE */
.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
  padding:5px 12px;
  font-size:11px;
  border-radius:20px;
  font-weight:600;
  letter-spacing:0.5px;
}

/* OVERLAY */
.product-card::after{
  content:"Voir le produit";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:25px;
  color:white;
  font-size:17px;
  font-weight:500;
  opacity:0;
  transition:0.4s;
}
.product-card:hover::after{
  opacity:1;
}

/* DARK MODE UPDATED LIKE INDEX.HTML */
body.dark {
  background: #0f172a;
  color: #f1f5f9;
}

body.dark .navbar {
  background: rgba(30,30,30,0.8);
  color: #f1f5f9;
}

body.dark .navbar h2,
body.dark .nav-links a {
  color: #f1f5f9;
}

body.dark .product-card {
  background: rgba(30,30,30,0.5);
  backdrop-filter: blur(12px);
  color: #f1f5f9;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

body.dark .product-info h4 {
  color: #f1f5f9;
}

body.dark .price {
  background: linear-gradient(135deg,#3b82f6,#10b981);
}

/* ANIMATION */
.product-card{
  animation:fadeInUp 0.6s ease;
}

@keyframes fadeInUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* RESPONSIVE */
@media(max-width:900px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .products{
    grid-template-columns:1fr;
    padding:20px;
  }

  .navbar{
    flex-direction:column;
    gap:10px;
  }
}
.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  object-fit: cover;
  border: 2px solid white;
}
.avatar-circle {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #3b82f6;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

.user-menu {
  position: relative;
}

.dropdown {
  position: absolute;
  top: 45px;
  right: 0;
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  min-width: 150px;
  z-index: 999;
}

.dropdown button {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #f1f5f9;
  cursor: pointer;
}

.dropdown button:hover {
  background: #e2e8f0;
}

.hidden {
  display: none;
}
/* 🌙 DARK MODE DROPDOWN FIX */
body.dark .dropdown {
  background: #1e293b; /* خلفية داكنة */
  color: #f1f5f9;       /* نص أبيض */
}

body.dark .dropdown p {
  color: #f1f5f9;
}

body.dark .dropdown button {
  background: #334155;
  color: white;
}

body.dark .dropdown button:hover {
  background: #475569;
}
body.dark .avatar-circle {
  border: 2px solid #f1f5f9;
}
</style>
</head>

<body>
<div class="navbar">
  <h2>Smart Market</h2>
  <div class="nav-links">
    <a href="index.html" id="navHome">Accueil</a>
    <a href="products.html" id="navProducts">Produits</a>
    <div id="authArea"></div>
    <button onclick="toggleDarkMode()">🌙</button>
    <div class="cart" onclick="goToCart()">🛒 0</div>
  </div>
</div>

<div class="filters">
  <select id="categoryFilter">
    <option value="all">Toutes catégories</option>
    <option value="electronique">Électronique</option>
    <option value="mode">Mode</option>
    <option value="maison">Maison</option>
    <option value="local">Local</option>
  </select>
</div>

<div class="products" id="productsContainer"></div>

<script>
// TRANSLATIONS & LANGUAGE LOGIC (كما عندك)
const translations = {
  fr:{home:"Accueil",products:"Produits",login:"Connexion",profileBtn: "Profil",
  logoutBtn: "Déconnexion"},
  en:{home:"Home",products:"Products",login:"Login",profileBtn: "Profile",
  logoutBtn: "Logout"},
  ar:{home:"الرئيسية",products:"المنتجات",login:"تسجيل الدخول",profileBtn: "الملف الشخصي",
  logoutBtn: "تسجيل الخروج"}
};
const categoriesTranslations = {
  fr:{all:"Toutes catégories",electronique:"Électronique",mode:"Mode",maison:"Maison",local:"Local"},
  en:{all:"All categories",electronique:"Electronics",mode:"Fashion",maison:"Home",local:"Local"},
  ar:{all:"كل الفئات",electronique:"إلكترونيات",mode:"موضة",maison:"منزل",local:"محلي"}
};
const translatedNames = {
  "Ordinateur Portable": {en:"Laptop", ar:"حاسوب محمول"},
  "Casque Audio": {en:"Headphones", ar:"سماعات"},
  "Smartphone": {en:"Smartphone", ar:"هاتف ذكي"},
  "Montre Intelligente": {en:"Smart Watch", ar:"ساعة ذكية"},
  "Tablette": {en:"Tablet", ar:"جهاز لوحي"},
  "Écouteurs sans fil": {en:"Wireless Earbuds", ar:"سماعات لاسلكية"},
  "Clé USB": {en:"USB Flash Drive", ar:"فلاش USB"},
  "Disque dur externe": {en:"External Hard Drive", ar:"قرص صلب خارجي"},
  "Projecteur": {en:"Projector", ar:"بروجكتور"},
  "Imprimante": {en:"Printer", ar:"طابعة"},
  "Clavier Gaming": {en:"Gaming Keyboard", ar:"لوحة مفاتيح ألعاب"},
  "Souris Sans Fil": {en:"Wireless Mouse", ar:"فأرة لاسلكية"},
  "Écran PC": {en:"Monitor", ar:"شاشة"},
  "Webcam HD": {en:"HD Webcam", ar:"كاميرا ويب"},
  "T-shirt": {en:"T-shirt", ar:"قميص"},
  "Robe": {en:"Dress", ar:"فستان"},
  "Chaussures": {en:"Shoes", ar:"أحذية"},
  "Jupe": {en:"Skirt", ar:"تنورة"},
  "Veste": {en:"Jacket", ar:"سترة"},
  "Casquette": {en:"Cap", ar:"قبعة"},
  "Lunettes de soleil": {en:"Sunglasses", ar:"نظارات شمسية"},
  "Sac à dos": {en:"Backpack", ar:"حقيبة ظهر"},
  "Ceinture": {en:"Belt", ar:"حزام"},
  "Pantalon": {en:"Pants", ar:"بنطال"},
  "Montre Classique": {en:"Classic Watch", ar:"ساعة كلاسيكية"},
  "Pull Hiver": {en:"Winter Sweater", ar:"سترة شتوية"},
  "accessoires": {en:"Accessories", ar:"إكسسوارات"},
  "Sandales": {en:"Sandals", ar:"صنادل"},
  "Sac à main": {en:"Handbag", ar:"حقيبة يد"},
  "Chaise": {en:"Chair", ar:"كرسي"},
  "Table": {en:"Table", ar:"طاولة"},
  "Lampe": {en:"Lamp", ar:"مصباح"},
  "Canapé": {en:"Sofa", ar:"أريكة"},
  "Commode": {en:"Dresser", ar:"خزانة"},
  "Bibliothèque": {en:"Bookshelf", ar:"مكتبة"},
  "Tapis": {en:"Carpet", ar:"سجاد"},
  "Rideaux": {en:"Curtains", ar:"ستائر"},
  "Miroir": {en:"Mirror", ar:"مرآة"},
  "Horloge murale": {en:"Wall Clock", ar:"ساعة حائط"},
  "Lit Double": {en:"Double Bed", ar:"سرير مزدوج"},
  "Oreiller": {en:"Pillow", ar:"وسادة"},
  "Ventilateur": {en:"Fan", ar:"مروحة"},
  "Climatiseur": {en:"Air Conditioner", ar:"مكيف"},
  "Miel Naturel": {en:"Natural Honey", ar:"عسل طبيعي"},
  "Huile d'olive": {en:"Olive Oil", ar:"زيت زيتون"},
  "Fromage artisanal": {en:"Artisan Cheese", ar:"جبن تقليدي"},
  "Confiture maison": {en:"Homemade Jam", ar:"مربى منزلي"},
  "Yaourt local": {en:"Local Yogurt", ar:"زبادي محلي"},
  "Pain artisanal": {en:"Artisan Bread", ar:"خبز تقليدي"},
  "Beurre frais": {en:"Fresh Butter", ar:"زبدة طازجة"},
  "Jus naturel": {en:"Natural Juice", ar:"عصير طبيعي"},
  "Épices locales": {en:"Local Spices", ar:"توابل محلية"},
  "Chocolat artisanal": {en:"Artisan Chocolate", ar:"شوكولاتة تقليدية"},
  "Dattes Deglet Nour":{en:"Deglet Nour dates", ar:"تمور دقلة نور"},
  "Couscous artisanal":{en:"Artisanal couscous", ar:"الكسكس المصنوع يدوياً"},
  "Figue sèche":{en:"Dried fig", ar:"التين المجفف"},
  "Olives locales":{en:"Local olives", ar:"ازيتون محلي"}
};


function applyLanguage(lang){
  document.getElementById("navHome").innerText = translations[lang].home;
  document.getElementById("navProducts").innerText = translations[lang].products;

  const select = document.getElementById("categoryFilter");
  select.options[0].text = categoriesTranslations[lang].all;
  select.options[1].text = categoriesTranslations[lang].electronique;
  select.options[2].text = categoriesTranslations[lang].mode;
  select.options[3].text = categoriesTranslations[lang].maison;
  select.options[4].text = categoriesTranslations[lang].local;
  document.body.setAttribute("dir", lang==="ar"?"right":"left");
}
function updateAuthUI() {
  let user = JSON.parse(localStorage.getItem("user"));
  const authArea = document.getElementById("authArea");
  const lang = localStorage.getItem('lang') || 'fr';
 // اللون المحفوظ

  if (user) {
    let letter = user.name.charAt(0).toUpperCase();
    authArea.innerHTML = `
      <div class="user-menu">
        <div class="avatar-circle" onclick="toggleMenu()">
          ${letter}
        </div>
        <div id="dropdownMenu" class="dropdown hidden">
          <p>${user.name}</p>
          <button onclick="goProfile()">${translations[lang].profileBtn}</button>
          <button onclick="logout()">${translations[lang].logoutBtn}</button>
        </div>
      </div>
    `;
    // تطبيق اللون مباشرة بعد إنشاء الـ avatar
    const avatar = authArea.querySelector('.avatar-circle');
    let avatarTheme = localStorage.getItem("avatarTheme") || "#3b82f6";
avatar.style.background = avatarTheme;
  } else {
    authArea.innerHTML = `<a href="login.html">${translations[lang].login}</a>`;
  }
}
// PRODUCTS DISPLAY
let allProducts = [];
function displayProducts(list){
  const container = document.getElementById("productsContainer");
  container.innerHTML = "";
  const lang = localStorage.getItem("lang") || "fr";

  list.forEach(p=>{
    let badge = Math.random()>0.7?"Promo":"New";
    let productName = p.name;
    if(lang !== "fr" && translatedNames[p.name]){
      productName = translatedNames[p.name][lang] || p.name;
    }
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <div class="badge">${badge}</div>
      <img src="${p.image}">
      <div class="product-info"><h4>${productName}</h4></div>
      <p class="price">${p.price} DA</p>
    `;
    card.onclick = ()=> goToProduct(p.id);
    container.appendChild(card);
    card.querySelector("img").addEventListener("load", masonryLayout);
  });
}
function toggleMenu() {
  document.getElementById("dropdownMenu").classList.toggle("hidden");
}

function logout() {
  localStorage.removeItem("user");
  window.location.reload();
}

function goProfile() {
  window.location.href = "profile.html";
}
document.addEventListener("click", function(e){
  let menu = document.getElementById("dropdownMenu");
  let avatar = document.querySelector(".avatar-circle");

  if(menu && !menu.contains(e.target) && !avatar.contains(e.target)){
    menu.classList.add("hidden");
  }
});
function goToProduct(id){ window.location.href="product.html?id="+id; }

// ================== FILTER & SEARCH ==================
function getSelectedCategory() {
  const params = new URLSearchParams(window.location.search);
  return params.get('category');
}
function getSearchQuery() {
  const params = new URLSearchParams(window.location.search);
  return params.get('search');
}

// ================== CART ==================
function addCart(name,price){
  let cart=JSON.parse(localStorage.getItem("cart"))||[];
  let existing=cart.find(i=>i.name===name);
  if(existing){existing.quantity++;}else{cart.push({name,price,quantity:1});}
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
}
function updateCart(){
  let cart=JSON.parse(localStorage.getItem("cart"))||[];
  let total=cart.reduce((s,i)=>s+i.quantity,0);
  document.querySelector(".cart").innerText="🛒 "+total;
}
function goToCart(){window.location.href="cart.html";}

// ================== DARK MODE ==================
function toggleDarkMode(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode",document.body.classList.contains("dark"));
}
if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark");

// ================== MASONRY ==================
function masonryLayout() {
  const cards = document.querySelectorAll(".product-card");
  const rowHeight = parseInt(window.getComputedStyle(document.querySelector('.products')).getPropertyValue('grid-auto-rows'));
  const rowGap = parseInt(window.getComputedStyle(document.querySelector('.products')).getPropertyValue('gap'));
  cards.forEach(card => {
    const cardHeight = card.querySelector('img').getBoundingClientRect().height + card.querySelector('.product-info').getBoundingClientRect().height + 20;
    const rowSpan = Math.ceil((cardHeight + rowGap) / (rowHeight + rowGap));
    card.style.gridRowEnd = "span " + rowSpan;
  });
}
window.addEventListener('load', masonryLayout);
window.addEventListener('resize', masonryLayout);

// ================== DOMContentLoaded ==================
window.addEventListener("DOMContentLoaded", ()=>{
  const lang = localStorage.getItem("lang") || "fr";
  applyLanguage(lang);
  updateCart();
  updateAuthUI();

  fetch("getProducts.php").then(res=>res.json()).then(data=>{
    allProducts = data;

    let filtered = allProducts;
    const categoryFromURL = getSelectedCategory();
    const searchQuery = getSearchQuery();

    if(categoryFromURL) filtered = filtered.filter(p => p.category === categoryFromURL);
    if(searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));

    if(categoryFromURL) document.getElementById("categoryFilter").value = categoryFromURL;

    displayProducts(filtered);
  });

  // ================== CATEGORY CARDS ==================
  document.querySelectorAll(".category-card").forEach(card=>{
    card.addEventListener("click", ()=>{
      const catKey = card.querySelector(".cat-text").dataset.key;
      window.location.href = `products.html?category=${catKey}`;
    });
  });

  // ================== CATEGORY SELECT ==================
  document.getElementById("categoryFilter").addEventListener("change", function(){
    let val=this.value;
    displayProducts(val==="all"?allProducts:allProducts.filter(p=>p.category===val));
  });
});

</script>
</body>
</html>
